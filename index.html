<!DOCTYPE html>
<html lang="fr">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Coupe du Monde MPP 2026</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #020b25;
      color: #49e68e;
      font-family: 'Barlow', sans-serif;

      overflow-x: hidden;
      overflow-y: auto;
    }

    .dashboard {
      min-height: 100vh;
      padding: 14px;
      box-sizing: border-box;
    }

    /* =========================================
       LEFT COLUMN
    ========================================= */

    .left-column {
      height: calc(100vh - 28px);
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow: hidden;
    }

    /* =========================================
       RIGHT COLUMN
    ========================================= */

    .right-column {
      height: calc(100vh - 28px);
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow: hidden;
    }

    .dashboard {
      min-height: 100dvh;
    }

    /* =========================================
       BAR CHART
    ========================================= */

    .ranking-box {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    #ranking_scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding-right: 10px;
      min-height: 0;
    }

    #ranking_container {
      position: relative;
      width: 100%;
    }

    .ranking-row {
      display: grid;
      grid-template-columns:
        40px   /* rank */
        1fr    /* bar */
        50px   /* trend */
        80px;  /* points */
      align-items: center;
      gap: 10px;
      height: 56px;
      min-height: 56px;
      transition:
        transform 1800ms cubic-bezier(.22,1,.36,1),
        opacity 400ms ease;
      will-change: transform;
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      will-change: transform;
      backface-visibility: hidden;
      transform-style: preserve-3d  
    }

    .ranking-row.overtake {
      animation:
        overtakeFlash 900ms ease;
    }
    @keyframes overtakeFlash {
      0% {
        filter: brightness(1);
      }
      25% {
        filter: brightness(1.35);
      }
      100% {
        filter: brightness(1);
      }
    }

    .rank {
      text-align: center;
      font-size: 22px;
      font-weight: 900;
    }

    .bar-wrapper {
      position: relative;
      height: 56px;
      overflow: hidden;
      background: #031027;
      border-radius: 14px;
      border: 1px solid rgb(30 41 59);
    }

    .ranking-bar {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 0%;
      border-radius: 14px;
      transition:
        width 1200ms cubic-bezier(.22,1,.36,1),
        background 700ms ease;
    }

    .bar-content {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding-inline: 14px;
    }

    .avatar {
      width: 55px;
      height: 55px;
      border-radius: 999px;
      object-fit: cover;
      background: #334155;
      border: 1px solid rgba(255,255,255,.15);
      flex-shrink: 0;
    }

    .player-info {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 12px;
      flex-wrap: nowrap;
    }

    .alias,
    .prono {
      display: inline-block;
      width: fit-content;
      padding:
        1px 8px;
      border-radius: 999px;
      backdrop-filter: blur(600px);
      background:
        rgba(255,255,255,.22);
      border:
        1px solid rgba(255,255,255,.18);
      box-shadow:
        0 2px 8px rgba(0,0,0,.18);
    }

    .alias {
      font-size: 26px;
      font-weight: 1000;
      text-transform: uppercase;
      line-height: 1;
    }

    .prono {
      font-size: 18px;
      font-weight: 400;
    }

    .points-wrapper {
      text-align: right;
    }

    .points-value {
      font-size: 22px;
      font-weight: 900;
      line-height: 1;
    }

    .points-gain {
      font-size: 14px;
      color: #49e68e;
      font-weight: 600;
      margin-top: 2px;
    }

    /* =========================================
       TIMELINE
    ========================================= */

    .timeline-box {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    #timeline_container {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-right: 8px;
      min-height: 0;
    }

    .timeline-item {
      cursor: pointer;
      transition: .25s ease;
    }

    .timeline-item:hover {
      transform: translateY(-2px);
      border-color: #A6D8BA !important;
    }

    .timeline-item.active {
      border-color: #A6D8BA !important;
      box-shadow:
        0 0 18px rgba(166,216,186,.25);
    }

    .stats-container{
        display:flex;
        flex-direction:column;
        gap:12px;
        max-height:70vh;
        width:min(1600px,96vw);
        /* max-width:96vw; */
        overflow-y:auto;
        padding-right:8px;
    }

    .stats-ranking-container{
        display:flex;
        flex-direction:column;
        gap:12px;
        max-height:70vh;
        /* width:1400px; */
        /* max-width:96vw; */
        overflow-y:auto;
        padding-right:8px;
    }

    .stats-ranking-row{
        display:grid;
        grid-template-columns:50px 1fr 100px;
        align-items:center;
        gap:12px;
        height:56px;
    }

    .stats-ranking-row .bar-wrapper{
        position:relative;
        height:56px;
        overflow:hidden;
        background:#031027;
        border-radius:14px;
        border:1px solid rgb(30 41 59);
    }

    .stats-ranking-row .ranking-bar{
        position:absolute;
        left:0;
        top:0;
        bottom:0;
        width:0%;
        border-radius:14px;
        transition:width 1200ms cubic-bezier(.22,1,.36,1);
    }

    .center-wrapper{
        position:relative;
        height:56px;
        overflow:hidden;
        background:#031027;
        border-radius:14px;
        border:1px solid rgb(30 41 59);
    }

    .center-wrapper::after{
        content:"";
        position:absolute;
        left:50%;
        top:6px;
        bottom:6px;
        width:2px;
        background:rgb(255, 255, 255, .999);
        z-index:2;
    }

    .bar-positive{
        left:50%;
        transform-origin:left center;
    }

    .bar-negative{
        transform-origin:right center;
    }

    .stats-center-row{
        display:grid;
        grid-template-columns:50px 330px 1fr 90px;
        align-items:center;
        gap:16px;
        height:56px;
    }

    .stats-center-player{
        display:flex;
        align-items:center;
        gap:12px;
    }

    .stats-center-graph{
        position:relative;
        height:42px;
        background:#031027;
        border-radius:12px;
        border:1px solid rgb(30 41 59);
        overflow:hidden;
    }

    .stats-center-axis{
        position:absolute;
        left:50%;
        top:4px;
        bottom:4px;
        width:2px;
        background:rgba(255,255,255,.25);
    }

    .stats-center-bar{
        position:absolute;
        top:0;
        bottom:0;
        border-radius:10px;
        transition:all 900ms cubic-bezier(.22,1,.36,1);
    }

    /* =========================================
       SCROLLBAR
    ========================================= */

    #ranking_scroll::-webkit-scrollbar,
    #timeline_container::-webkit-scrollbar {
      width: 8px;
    }

    #ranking_scroll::-webkit-scrollbar-track,
    #timeline_container::-webkit-scrollbar-track {
      background: #02102a;
      border-radius: 20px;
    }

    #ranking_scroll::-webkit-scrollbar-thumb,
    #timeline_container::-webkit-scrollbar-thumb {
      background:
        linear-gradient(
          180deg,
          #A6D8BA,
          #4e9b73
        );
      border-radius: 20px;
    }

    /* =========================================
      MOBILE
    ========================================= */

    @media (max-width: 768px) {
      .dashboard {
        padding: 10px;
      }

      h1 {
        font-size: 1.8rem !important;
        line-height: 1.1;
      }

      #play_button,
      #reset_button {
        width: 52px !important;
        height: 52px !important;
        font-size: 20px !important;
      }

      .ranking-row {

        grid-template-columns:
          36px
          1fr
          36px
          60px;

        height: 72px;
        min-height: 72px;

        gap: 6px;
      }

      .avatar {
        width: 38px;
        height: 38px;
      }

      .alias {
        font-size: 13px;
      }

      .prono {
        font-size: 10px;
      }

      .points-value {
        font-size: 16px;
      }

      .rank {
        font-size: 16px;
      }

      .timeline-item {
        padding: 12px !important;
      }

      #score_block {
        transform: scale(0.9);
      }

      #team1,
      #team2 {
        font-size: 11px !important;
      }
    }

    .stats-card{
        display:flex;
        align-items:center;
        gap:18px;
        background:#031027;
        border:1px solid #0e5d74;
        border-radius:22px;
        padding:18px;
        transition:.25s;
    }

    .stats-card:hover{
        border-color:#49e68e;
        transform:translateY(-2px);
        box-shadow:0 0 18px rgba(73,230,142,.15);
    }

    .stats-photo{
        width:72px;
        height:72px;
        border-radius:999px;
        object-fit:cover;
        border:2px solid rgba(255,255,255,.15);
        flex-shrink:0;
    }

    .stats-middle{
        flex:1;
    }

    .stats-title{
        color:#A6D8BA;
        font-size:13px;
        text-transform:uppercase;
        font-weight:700;
        letter-spacing:.05em;
    }

    .stats-player{
        font-size:24px;
        font-weight:900;
        color:white;
        margin-top:4px;
    }

    .stats-value{
        font-size:36px;
        font-weight:900;
        color:#49e68e;
        line-height:1;
    }

    @media (max-width: 1024px) {

      html,
      body {
        overflow-y: auto;
        height: auto;
      }

      .dashboard {
        min-height: auto;
      }

      .left-column,
      .right-column {
        height: auto;
        overflow: visible;
      }

      .ranking-box,
      .timeline-box {
        min-height: auto;
        overflow: visible;
      }

      /* IMPORTANT :
        scroll désactivé UNIQUEMENT sur mobile */
      #ranking_scroll,
      #timeline_container {
        overflow: visible;
        max-height: none;
      }

      .ranking-row {
        grid-template-columns:
          40px
          1fr
          40px
          80px;

        height: 52px;
        min-height: 52px;
      }

      .avatar {
        width: 34px;
        height: 34px;
      }

      .alias {
        font-size: 13px;
      }

      .prono {
        font-size: 10px;
      }

      .points-value {
        font-size: 18px;
      }

      .rank {
        font-size: 16px;
      }

      .bar-content {
        padding-inline: 8px;
        gap: 6px;
      }

      h1 {
        font-size: 28px !important;
        line-height: 1.1;
      }

      #countdown_text {
        font-size: 28px !important;
        text-align: center;
      }

      #match_location,
      #match_datetime {
        font-size: 11px;
      }

      .timeline-item {
        padding: 12px;
      }

      .timeline-item .text-xl {
        font-size: 16px !important;
      }

      .timeline-item .text-lg {
        font-size: 15px !important;
      }

      button#play_button,
      button#reset_button {
        width: 52px;
        height: 52px;
        font-size: 20px;
      }
    }

  </style>

</head>

<script>

  let timeline = [];
  let selectedPlayers = [];
  let allPlayers = [];
  let currentMatchIndex = 0;
  let playing = false;
  let interval = null;
  let previousRanks = {};
  const ROW_HEIGHT = 64;

  async function loadExcel() {

    const response =
      await fetch(
        './WorldCup2026.xlsx?t=' + Date.now()
      );

    const arrayBuffer =
      await response.arrayBuffer();

    const workbook =
      XLSX.read(arrayBuffer, { type: 'array' });

    const sheet =
      workbook.Sheets['Pronostics'];

    const statsSheet =
      workbook.Sheets['Stats'];
    window.statsData =
      XLSX.utils.sheet_to_json(statsSheet);

    const statsDetailsSheet =
      workbook.Sheets["Stats details"];
    window.statsDetails =
      XLSX.utils.sheet_to_json(statsDetailsSheet);
    
    const rows =
      XLSX.utils.sheet_to_json(sheet);

    allPlayers = [...new Set(rows.map(r => r.profile_alias))]
        .sort((a, b) => a.localeCompare(b));

    selectedPlayers = [...allPlayers];

    buildTimeline(rows);
    renderTimeline();
    renderMatch(0);
  }

  function buildTimeline(rows) {
    const grouped = {};
    rows.forEach(row => {
      const key = row.match_id;
      if (!grouped[key]) {
        grouped[key] = [];
      }
      grouped[key].push(row);
    });
    timeline =
      Object.values(grouped)
        .sort((a, b) => a[0].match_id - b[0].match_id);
    timeline.unshift([
      {
        match_id: 0,
        type: 'pre_tournament',
        status: 'Avant l’ouverture',
        title: 'Avant le coup d’envoi'
      }
    ]);

    // =====================================
    // BONUS FLAGS
    // =====================================
    timeline.forEach(matchRows => {
      const match = matchRows[0];
      if (Number(match.match_id) === 105) {
        match.type = 'bonus';
        match.bonus_type = 'top_scorer';
        match.title = 'MEILLEUR BUTEUR';

      if (Number(match.match_id) === 106) {
        match.type = 'bonus';
        match.bonus_type = 'winner';
        match.title = 'VAINQUEUR COUPE DU MONDE';
      }
    });
    const realMatches =
      timeline.filter(m => {
        const id = Number(m[0].match_id);

        return (
          id >= 1 &&
          id <= 104
        );
      });

    document.getElementById('match_total').innerText =
      realMatches.length;
  }

  function scrollTimelineToMatch(index) {

    setTimeout(() => {

      const container =
        document.getElementById('timeline_container');

      const target =
        document.querySelector(
          `.timeline-item[data-timeline-index="${index}"]`
        );

      if (!target) return;

      const containerHeight =
        container.clientHeight;

      const targetTop =
        target.offsetTop;

      const scrollPosition =
        targetTop - (containerHeight * 0.35);

      container.scrollTo({
        top: scrollPosition,
        behavior: 'smooth'
      });

    }, 1);
  }

  function renderRanking(players) {

    players = players.filter(player =>
        selectedPlayers.includes(player.profile_alias)
    );

    if (!players.length) {
      document.getElementById('ranking_container').innerHTML = '';
      return;
    }
    const container =
      document.getElementById('ranking_container');
    const firstPositions = {};
    container
      .querySelectorAll('.ranking-row')
      .forEach(row => {

        firstPositions[row.dataset.player] =
          row.getBoundingClientRect().top;

      });
    const max =
      players[0].points_cumulative;
    let previousPoints = null;
    let displayRank = 0;
    players.forEach(player => {
      let row =
        container.querySelector(
          `[data-player="${player.profile_id}"]`
        );
      if (!row) {
        row =
          document.createElement('div');
        row.dataset.player =
          player.profile_id;
        row.className =
          'ranking-row';
        row.innerHTML = `
          <div class="rank"></div>
          <div class="bar-wrapper">
            <div class="ranking-bar"></div>
            <div class="bar-content">
              <img class="avatar"
                  onerror="this.src='./photos/default.png'" />
              <div class="player-info">
                <div class="alias"></div>
                <div class="prono"></div>
              </div>

            <!-- BONUS IMAGE -->
            <img class="
                  bonus-image
                  hidden
                  ml-auto
                  w-10
                  h-10
                  rounded-full
                  object-cover
                  border
                  border-white/20
                  shrink-0
                " />

            </div>
          </div>
          <div class="trend text-2xl text-center">
            🟰
          </div>
          <div class="points-wrapper">
            <div class="points-value">0</div>
            <div class="points-gain"></div>
          </div>
        `;
        container.appendChild(row);
      }
    });
    players.forEach((player, index) => {
      const previousRank =
        previousRanks[player.profile_id];
      const newRank =
        index + 1;
      let trend = '';
      if (Number(player.match_id) !== 0) {
        trend = '🟰';
        if (previousRank) {
          if (newRank < previousRank) {
            trend = '🔼';
          }
          else if (newRank > previousRank) {
            trend = '🔽';
          }
        }
      }
      const row =
        container.querySelector(
          `[data-player="${player.profile_id}"]`
        );
      const width =
        (player.points_cumulative / max) * 100;
      // =====================================
      // HANDLE TIES
      // =====================================

      if (player.points_cumulative !== previousPoints) {
        displayRank = index + 1;
      }

      previousPoints =
        player.points_cumulative;
      // =====================================
      // MEDALS
      // =====================================

      const medal =
        displayRank === 1 ? '🥇' :
        displayRank === 2 ? '🥈' :
        displayRank === 3 ? '🥉' :
        displayRank;
      const avatar =
        `./photos/${String(player.profile_id)
          .trim()
          .replace('.0','')}.png`;
      // =====================================
      // PLAYER COLORS
      // =====================================

      const color1 =
        String(player.profile_color_1 || '#A6D8BA').trim();
      const color2 =
        String(player.profile_color_2 || '#4e9b73').trim();
      // Dégradé dynamique joueur

      const gradient =
        `linear-gradient(90deg, ${color1}, ${color2})`;
      // =====================================
      // OVERTAKE ANIMATION
      // =====================================

      if (
        previousRank &&
        newRank < previousRank
      ) {
        row.classList.remove('overtake');
        void row.offsetWidth;
        row.classList.add('overtake');
      }

      previousRanks[player.profile_id] =
        newRank;
      row.dataset.targetY =
        index * ROW_HEIGHT;

      // row.style.transform =
      //   `translateY(${row.dataset.targetY}px)`;

      row.style.transform =
        `translate3d(0, ${row.dataset.targetY}px, 0)`;
      
      row.querySelector('.rank').innerHTML =
        medal;
      row.querySelector('.trend').innerHTML =
        trend;
      row.querySelector('.avatar').src =
        avatar;
      const bonusImage =
        row.querySelector('.bonus-image');

      // RESET
      bonusImage.classList.add('hidden');

      // BONUS 105 → meilleur buteur
      if (Number(player.match_id) === 105) {

        bonusImage.src =
          `./assets/players/${String(player.img_prono_bonus)
            .trim()
            .replaceAll(' ', '_')}.png`;

        bonusImage.classList.remove('hidden');
      }

      // BONUS 106 → champion du monde
      if (Number(player.match_id) === 106) {

        bonusImage.src =
          `./assets/flags/${player.img_prono_bonus}.png`;

        bonusImage.classList.remove('hidden');
      }
      const aliasElement =
        row.querySelector('.alias');
      const pronoElement =
        row.querySelector('.prono');
      // =====================================
      // TEXT
      // =====================================

      aliasElement.innerText =
        // `${player.profile_name}`;
        // `${player.profile_alias} (${player.profile_name})`;
        `${player.profile_alias}`;
      const prono1 =
        player.prono_score1 ?? '';
      const prono2 =
        player.prono_score2 ?? '';

      // =====================================
      // RESULT ICON
      // =====================================

      const final1 =
        Number(player.final_score1);

      const final2 =
        Number(player.final_score2);

      const pred1 =
        Number(player.prono_score1);

      const pred2 =
        Number(player.prono_score2);

      let resultIcon = '';

        if (Number(player.match_id) !== 0) {

          // =====================================
          // AUCUN PRONO
          // =====================================

          const noPrediction =
            player.prono_score1 === '' ||
            player.prono_score1 == null ||
            player.prono_score2 === '' ||
            player.prono_score2 == null;

          // =====================================
          // MATCH PAS ENCORE JOUÉ
          // =====================================

          const noFinalScore =
            player.final_score1 === '-' ||
            player.final_score1 === '' ||
            player.final_score1 == null ||
            player.final_score2 === '-' ||
            player.final_score2 === '' ||
            player.final_score2 == null;

          // Pas encore de résultat officiel
          if (noFinalScore) {

            resultIcon = '';

          }

          // Aucun pronostic
          else if (noPrediction) {

            resultIcon = '😴';

          }

          else {

            if (
              pred1 === final1 &&
              pred2 === final2
            ) {

              resultIcon = '🎯';

            }

            else {

              const finalDiff =
                final1 - final2;

              const predDiff =
                pred1 - pred2;

              const sameOutcome =
                (finalDiff > 0 && predDiff > 0) ||
                (finalDiff < 0 && predDiff < 0) ||
                (finalDiff === 0 && predDiff === 0);

              resultIcon =
                sameOutcome
                  ? '✅'
                  : '❌';
            }
          }
        }

      const separator =
        (prono1 !== '' || prono2 !== '')
          ? '-'
          : '?';
      if (
        Number(player.match_id) === 106
      ) {
        pronoElement.innerText =
          `Champion du monde : ${player.prono_score1}`;
      }
      else if (
        Number(player.match_id) === 105
      ) {
        pronoElement.innerText =
          `Meilleur buteur : ${player.prono_score1}`;
      }
      else {
        if (Number(player.match_id) === 0) {
          pronoElement.innerText =
            'En attente du premier match';
        }
        else {
          pronoElement.innerText =
            `Match n°${player.match_id} - Prono: ${prono1}${separator}${prono2} ${resultIcon}`;
        }
      }

      // =====================================
      // TEXT COLORS
      // =====================================
      let textColor = '#000000';
      // 0 point => vert clair
      if (Number(player.points_cumulative) === 0) {
        textColor = '#49e68e';
      }

      aliasElement.style.color =
        textColor;

      pronoElement.style.color =
        textColor;

      // Joueur avec 0 point
      if (Number(player.points_cumulative) === 0) {

        aliasElement.style.background =
          'rgba(255,255,255,0.08)';

        pronoElement.style.background =
          'rgba(255,255,255,0.08)';

        aliasElement.style.border =
          '1px solid rgba(255,255,255,0.12)';

        pronoElement.style.border =
          '1px solid rgba(255,255,255,0.12)';
      }

      // Joueur avec points
      else {

        aliasElement.style.background =
          'rgba(255,255,255,0.28)';

        pronoElement.style.background =
          'rgba(255,255,255,0.20)';

        aliasElement.style.border =
          '1px solid rgba(255,255,255,0.18)';

        pronoElement.style.border =
          '1px solid rgba(255,255,255,0.12)';
      }
      const gainElement =
        row.querySelector('.points-gain');
      if (Number(player.points) > 0) {
        gainElement.innerText =
          `+${player.points}`;
        gainElement.style.opacity = '1';
      }

      else {
        gainElement.innerText = '';
        gainElement.style.opacity = '0';
      }
      
      // =====================================
      // POINTS COLOR
      // =====================================

      const pointsValue =
        row.querySelector('.points-value');
      // =====================================
      // POINTS COLOR
      // =====================================

      let pointsColor = color2;
      // 0 point => blanc
      if (Number(player.points_cumulative) === 0) {
        pointsColor = '#FFFFFF';
      }

      pointsValue.style.color =
        pointsColor;
      const bar =
        row.querySelector('.ranking-bar');
      requestAnimationFrame(() => {
        bar.style.width =
          `${width}%`;
        bar.style.background =
          gradient;
      });
      animateValue(
        row.querySelector('.points-value'),
        parseInt(
          row.querySelector('.points-value').innerText
        ) || 0,
        player.points_cumulative,
        1000
      );
    });
    requestAnimationFrame(() => {

      container
        .querySelectorAll('.ranking-row')
        .forEach(row => {

          const first =
            firstPositions[row.dataset.player];

          if (first == null) return;

          const last =
            row.getBoundingClientRect().top;

          const delta =
            first - last;

          if (!delta) return;

          const targetY =
            Number(row.dataset.targetY);

          row.style.transition = 'none';

          row.style.transform =
            `translateY(${targetY + delta}px)`;

          row.offsetHeight;

          row.style.transition =
            'transform 1800ms cubic-bezier(.22,1,.36,1)';

          row.style.transform =
            `translate3d(0, ${targetY}px, 0)`;

        });

    });
    container.style.height =
      `${players.length * ROW_HEIGHT}px`;
  }

  function animateValue(
    element,
    start,
    end,
    duration
  ) {
    let startTimestamp = null;
    const step = timestamp => {
      if (!startTimestamp)
        startTimestamp = timestamp;
      const progress =
        Math.min(
          (timestamp - startTimestamp) / duration,
          1
        );
      element.innerText =
        Math.floor(
          progress * (end - start) + start
        );
      if (progress < 1) {
        window.requestAnimationFrame(step);
      }
    };
    window.requestAnimationFrame(step);
  }

  function formatDate(value) {
    if (!value) return '';
    let date;
    // si déjà un objet Date
    if (value instanceof Date) {
      date = value;
    } else {
      // Excel serial date
      const utc_days =
        Math.floor(value - 25569);
      const utc_value =
        utc_days * 86400;
      date =
        new Date(utc_value * 1000);
      const fractional_day =
        value -
        Math.floor(value) +
        0.0000001;
      let totalSeconds =
        Math.floor(86400 * fractional_day);
      const seconds =
        totalSeconds % 60;
      totalSeconds -= seconds;
      const hours =
        Math.floor(totalSeconds / (60 * 60));
      const minutes =
        Math.floor(totalSeconds / 60) % 60;
      date.setHours(hours);
      date.setMinutes(minutes);
    }

    const day =
      String(date.getDate()).padStart(2, '0');
    const month =
      String(date.getMonth() + 1).padStart(2, '0');
    const year =
      date.getFullYear();
    const hours =
      String(date.getHours()).padStart(2, '0');
    const minutes =
      String(date.getMinutes()).padStart(2, '0');
    return `${day}/${month}/${year} ${hours}:${minutes}`;
  }

  function renderPositiveRanking(rows){
    document.getElementById("stats_detail_title").innerText =
        rows[0].nom;
    const container =
        document.getElementById("stats_detail_container");
    container.innerHTML="";
    if(!rows.length) return;
    rows.sort((a, b) => {
        const rankA = a.rank === "" || a.rank == null ? 9999 : Number(a.rank);
        const rankB = b.rank === "" || b.rank == null ? 9999 : Number(b.rank);
        return rankA - rankB;
    });
    const max =
        Math.max(...rows.map(r=>Number(r.score)));
    rows.forEach(player=>{
        const value =
            Number(player.score);
        const aliasColor =
          value > 0
              ? "#000000"
              : "#49e68e";
        const width =
            value/max*100;
        const rank =
            player.rank === "" || player.rank == null
                ? null
                : Number(player.rank);

        const medal =
            rank === 1 ? "🥇" :
            rank === 2 ? "🥈" :
            rank === 3 ? "🥉" :
            rank ?? "—";
        const color1 =
            player.profile_color_1 || "#A6D8BA";
        const color2 =
            player.profile_color_2 || "#4e9b73";
        const gradient =
            `linear-gradient(90deg,${color1},${color2})`;
        const row =
            document.createElement("div");
        row.className="stats-ranking-row";
        row.innerHTML=`
            <div class="rank">
                ${medal}
            </div>
            <div class="bar-wrapper">
                <div class="ranking-bar"></div>
                <div class="bar-content">
                    <img
                        class="avatar"
                        src="./photos/${player.profile_id}.png"
                        onerror="this.src='./photos/default.png'">
                    <div class="player-info">
                        <div
                          class="alias"
                          style="color:${aliasColor}">
                          ${player.profile_alias}
                      </div>
                    </div>
                </div>
            </div>
            <div class="points-wrapper">
                <div class="points-value">
                    ${value}
                </div>
            </div>
        `;
        container.appendChild(row);
        const bar =
            row.querySelector(".ranking-bar");

        requestAnimationFrame(()=>{
            bar.style.width=`${width}%`;
            bar.style.background=gradient;
        });
    });
  }

  function renderCenteredRanking(rows){

      document.getElementById("stats_detail_title").innerText =
          rows[0].nom;

      const container =
          document.getElementById("stats_detail_container");

      container.innerHTML = "";

      rows.sort((a,b)=>Number(b.score)-Number(a.score));

      const maxAbs = Math.max(
          ...rows.map(r=>Math.abs(Number(r.score)))
      );

      rows.forEach(player=>{

          const value = Number(player.score);

          const percent = Math.abs(value)/maxAbs*50;

          const medal =
              player.rank==1 ? "🥇" :
              player.rank==2 ? "🥈" :
              player.rank==3 ? "🥉" :
              player.rank;

          const aliasColor =
              value>=0
                  ? "#49e68e"
                  : "#A92424";

          const gradient =
              value>=0
                  ? `linear-gradient(90deg,${player.profile_color_1},${player.profile_color_2})`
                  : `linear-gradient(90deg,#d9534f,#ff8a8a)`;

          const row = document.createElement("div");

          row.className = "stats-center-row";

          row.innerHTML = `

              <div class="rank">${medal}</div>

              <div class="stats-center-player">
                  <img
                      class="avatar"
                      src="./photos/${player.profile_id}.png"
                      onerror="this.src='./photos/default.png'">
                  <div class="alias" style="color:${aliasColor}">
                      ${player.profile_alias}
                  </div>
              </div>

              <div class="stats-center-graph">
                  <div class="stats-center-axis"></div>
                  <div class="stats-center-bar"></div>
              </div>

              <div class="points-wrapper">
                  <div class="points-value" style="color:${aliasColor}">
                      ${value>0?"+":""}${value}
                  </div>
              </div>

          `;

          container.appendChild(row);

          const bar = row.querySelector(".stats-center-bar");

          requestAnimationFrame(()=>{

              bar.style.background = gradient;
              bar.style.width = percent + "%";

              if(value>=0){

                  bar.style.left = "50%";

              }else{

                  bar.style.left = (50-percent)+"%";

              }

          });

      });

  }

  function openStat(id){

      const rows =

              }
              else{
                  renderPositiveRanking(rows);
              }
              break;

          case "podium":
              renderPodium(rows);
              break;

          case "pie":

              break;

          case "line":

              break;
      }

      document
          .getElementById("statsDetails")
          .classList

          .getElementById("statsDetails")

  function excelDateToJSDate(excelDate) {
    const utc_days =
      Math.floor(excelDate - 25569);
    const utc_value =
      utc_days * 86400;
    const date_info =
      new Date(utc_value * 1000);
    const fractional_day =
      excelDate -
      Math.floor(excelDate) +
      0.0000001;
    let totalSeconds =
      Math.floor(86400 * fractional_day);
    const seconds =
      totalSeconds % 60;
    totalSeconds -= seconds;
    const hours =
      Math.floor(totalSeconds / (60 * 60));
    const minutes =
      Math.floor(totalSeconds / 60) % 60;
    date_info.setHours(hours);
    date_info.setMinutes(minutes);
    return date_info;
  }

  function updateCountdown(targetDate) {
    function refresh() {
      const now = new Date();
      const diff = targetDate - now;
      const matchDatetime =
        document.getElementById('match_datetime');
      if (!matchDatetime) return;
      if (diff <= 0) {
        return;
      }
      const totalSeconds =
        Math.floor(diff / 1000);
      const days =
        Math.floor(totalSeconds / 86400);
      const hours =
        Math.floor((totalSeconds % 86400) / 3600);
      const minutes =
        Math.floor((totalSeconds % 3600) / 60);
      const seconds =
        totalSeconds % 60;
      // matchDatetime.innerText =
      //   `Début dans ${days}j ${hours}h ${minutes}m ${seconds}s`;

      document.getElementById('countdown_text').innerText =
        `${days}j ${String(hours).padStart(2,'0')}h ${String(minutes).padStart(2,'0')}m ${String(seconds).padStart(2,'0')}s`;
    }

    // refresh immédiat
    refresh();

    // clear ancien timer
    clearInterval(window.countdownInterval);

    // refresh chaque seconde
    window.countdownInterval =
      setInterval(refresh, 1000);
  }

  const playButton =
    document.getElementById('play_button');

  playButton.addEventListener('click', () => {

    // ============================
    // PAUSE
    // ============================

    if (playing) {

      clearInterval(interval);

      playing = false;

      playButton.innerHTML = '▶';

      return;
    }

    // ============================
    // RESTART IF END
    // ============================

    if (currentMatchIndex >= timeline.length - 1) {

      currentMatchIndex = 0;
    }

    playing = true;

    playButton.innerHTML = '❚❚';

    renderMatch(currentMatchIndex);

    interval = setInterval(() => {

      // ==================================
      // NEXT INDEX
      // ==================================

      const nextIndex =
        currentMatchIndex + 1;

      // ==================================
      // END OF TIMELINE
      // ==================================

      if (
        nextIndex >= timeline.length ||
        !timeline[nextIndex] ||
        !timeline[nextIndex][0]
      ) {

        clearInterval(interval);

        playing = false;

        playButton.innerHTML = '▶';

        return;
      }

      // ==================================
      // NEXT MATCH
      // ==================================

      const nextMatch =
        timeline[nextIndex][0];

      const status =
        String(nextMatch.status || '')
          .trim()
          .toLowerCase();

      const isCurrentMatch =
        status === 'en cours' ||
        status === 'à venir';

      const isLastMatch =
        Number(nextMatch.match_id) === 104;

      // ==================================
      // RENDER
      // ==================================

      currentMatchIndex =
        nextIndex;

      renderMatch(currentMatchIndex);

      // ==================================
      // STOP CONDITIONS
      // ==================================

      if (isCurrentMatch || isLastMatch) {

        clearInterval(interval);

        playing = false;

        playButton.innerHTML = '▶';
      }

    }, 2500);

  });
